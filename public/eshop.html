<body class="eshop-body">
    <nav class="public-nav">
        <a class="public-nav-brand" href="/">
            <span class="brand-dot"></span>
            <span>3D by Aurora</span>
        </a>
        <div class="public-nav-links">
            <a href="/faq.html">FAQ</a>
            <a href="/nosotros.html">Nosotros</a>
        </div>
    </nav>

    <header class="eshop-header">
        <span class="home-hero-eyebrow">Catálogo</span>
        <h1>Todas nuestras piezas</h1>
        <p class="eshop-sub">Buscá lo que necesitás y coordinamos por WhatsApp, o compralo directo por Mercado Libre.</p>

        <div class="search-bar">
            <input type="search" id="eshopSearch" placeholder="Buscá por nombre o categoría..." oninput="buscarEshop()" onkeydown="if(event.key==='Enter')buscarEshop()" autocomplete="off" enterkeyhint="search" aria-label="Buscar productos">
            <button type="button" onclick="buscarEshop()">Buscar</button>
        </div>

        <div id="eshopCategorias" class="home-categorias"></div>

        <div class="eshop-controles">
            <div class="eshop-orden">
                <label for="eshopOrden">Ordenar por</label>
                <select id="eshopOrden" onchange="cambiarOrden(this.value)">
                    <option value="destacados">Destacados</option>
                    <option value="precio-asc">Menor precio</option>
                    <option value="precio-desc">Mayor precio</option>
                    <option value="nuevos">Más nuevos</option>
                </select>
            </div>
            <div class="eshop-precio-filtro">
                <label for="precioMin">Precio</label>
                <input type="number" id="precioMin" placeholder="mín" min="0" inputmode="numeric" oninput="buscarEshop()" aria-label="Precio mínimo">
                <span aria-hidden="true">–</span>
                <input type="number" id="precioMax" placeholder="máx" min="0" inputmode="numeric" oninput="buscarEshop()" aria-label="Precio máximo">
            </div>
        </div>
    </header>

    <main class="eshop-main">
        <p id="eshopEstado" class="eshop-estado">Cargando catálogo...</p>
        <div id="eshopGrid" class="eshop-grid hidden"></div>
        <div id="eshopSentinel" aria-hidden="true"></div>
    </main>

    <footer class="eshop-footer">
        <p class="eshop-footer-text">Seguinos en nuestras redes</p>
        <div class="eshop-social">
            <a class="social-link" href="https://www.instagram.com/3dbyaurora/" target="_blank" rel="noopener noreferrer" aria-label="Instagram de 3D by Aurora">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                <span>Instagram</span>
            </a>
            <a class="social-link" href="https://www.tiktok.com/@3dbyaurora" target="_blank" rel="noopener noreferrer" aria-label="TikTok de 3D by Aurora">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.6 5.82s.51.5 0 0A4.278 4.278 0 0 1 15.54 3h-3.09v12.4a2.592 2.592 0 0 1-2.59 2.5c-1.42 0-2.6-1.16-2.6-2.6 0-1.72 1.66-3.01 3.37-2.48V9.66c-3.45-.46-6.47 2.22-6.47 5.64 0 3.33 2.76 5.7 5.69 5.7 3.14 0 5.69-2.55 5.69-5.7V9.01a7.35 7.35 0 0 0 4.32 1.39V7.32s-1.88.09-3.26-1.5z"/></svg>
                <span>TikTok</span>
            </a>
        </div>
    </footer>

    <a class="whatsapp-float" href="https://wa.me/5491127192970" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">

    <script src="utils.js"></script>
    <script src="icons.js"></script>
    <script src="carrito.js"></script>
    <script src="eshop.js"></script>
</body>
</html>
