<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video gracioso 😂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        .decoy {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            cursor: pointer;
            gap: 18px;
            text-align: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        .decoy .play { font-size: 72px; }
        .decoy h1 { font-size: 20px; font-weight: 700; }
        .decoy p { color: #9a9a9a; font-size: 14px; }

        .hidden { display: none !important; }

        .screamer {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            z-index: 9999;
        }
        .screamer.activo { animation: flash .12s steps(2) 5, shake .5s ease-in-out; }
        .screamer .cara { font-size: 55vmin; transform: scale(.1); }
        .screamer.activo .cara { animation: zoom .15s ease-out forwards; }

        @keyframes flash {
            0%, 100% { background: #fff; }
            50% { background: #c00; }
        }
        @keyframes zoom {
            to { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-14px, 10px); }
            40% { transform: translate(12px, -12px); }
            60% { transform: translate(-10px, -14px); }
            80% { transform: translate(14px, 10px); }
        }
    </style>
</head>
<body>
    <div class="decoy" id="decoy">
        <div class="play">▶️</div>
        <h1>Mirá este video</h1>
        <p>Tocá para reproducir</p>
    </div>

    <div class="screamer hidden" id="screamer">
        <div class="cara">👹</div>
    </div>

    <script>
        document.getElementById('decoy').addEventListener('click', asustar, { once: true });

        function asustar() {
            document.getElementById('decoy').classList.add('hidden');
            const screamer = document.getElementById('screamer');
            screamer.classList.remove('hidden');
            screamer.classList.add('activo');
            reproducirGrito();
        }

        function reproducirGrito() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const duracion = 1.3;

            // Ruido blanco como base del grito
            const buffer = ctx.createBuffer(1, ctx.sampleRate * duracion, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const ruido = ctx.createBufferSource();
            ruido.buffer = buffer;

            // Oscilador con barrido de frecuencia (efecto "alarido")
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.15);
            osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + duracion);

            const gain = ctx.createGain();
            gain.gain.setValueAtTime(1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duracion);

            ruido.connect(gain);
            osc.connect(gain);
            gain.connect(ctx.destination);

            ruido.start();
            osc.start();
            ruido.stop(ctx.currentTime + duracion);
            osc.stop(ctx.currentTime + duracion);
        }
    </script>
</body>
</html>
